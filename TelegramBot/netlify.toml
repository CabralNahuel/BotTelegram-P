[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mysql2", "sequelize", "bcrypt", "jsonwebtoken", "grammy", "express", "cors", "dotenv"]

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200

[[redirects]]
  from = "/menu/*"
  to = "/.netlify/functions/api/menu/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

